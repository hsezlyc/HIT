<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈尔滨工业大学（威海）学生科创中心</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        .header {
            height: 100vh; /* 占满整个屏幕高度 */
            background-color: #6699CC;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .header h1 {
            font-size: 3em; /* 调整字体大小 */
            margin: 0;
            line-height: 1.2;
        }
        .nav {
            display: flex;
            justify-content: space-around;
            align-items: center; /* 添加此行使子元素垂直居中 */
            background-color: #f2f4f7;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            height: 200px; /* 设置导航栏高度 */
        }
        .nav-item {
            height: 231px;
            width: 311px;
            background-color: white; /* 设置背景为白色 */
            color: black; /* 设置文字为黑色 */
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            display: flex; /* 使用 Flexbox 布局 */
            justify-content: center; /* 水平居中 */
            align-items: center; /* 垂直居中 */
            position: relative;
            top: -70px;
        }
        .nav-item:hover {
            background-color: #f0f0f0; /* 鼠标悬停时背景变为浅灰色 */
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }
        .content {
            background-color: #f2f4f7;
            display: flex;
            justify-content: space-between; /* 左右分布 */
            padding: 40px; /* 增加内容区域的间距 */
            gap: 30px; /* 增加内容块之间的间距 */
        }
        .left-column, .right-column {
            flex: 1; /* 左右两列均分 */
        }
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 30px; /* 左列内部块之间的间距 */
        }
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 30px; /* 右列内部块之间的间距 */
        }
        .news {
            height: 400px;
            background-color: #fff;
            width: 80%; /* 调整宽度比例 */
            padding: 30px; /* 增加内边距 */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .announcement {
            height: 830px;
            background-color: #fff;
            width: 80%; /* 调整宽度比例 */
            padding: 30px; /* 增加内边距 */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .lecture {
            height: 400px;
            background-color: #fff;
            width: 80%; /* 调整宽度比例 */
            padding: 30px; /* 增加内边距 */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            
        }
        .news:hover, .lecture:hover, .announcement:hover{
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }
        .news-title, .lecture-title {
            background-color: #8FBC8F;
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        .student-style {
            background-color: #F4A460;
            width: 100%; /* 学生风采占满整行 */
            text-align: center;
        }
        .footer {
            background-color: #696969;
            color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 30px 20px; /* 增加页脚的内边距 */
            gap: 20px;
        }
        .footer-item {
            background-color: #808080;
            padding: 20px; /* 增加内边距 */
            border-radius: 8px;
            text-align: center;
            flex: 1;
            min-width: 200px;
        }
        .footer-item h3 {
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
                align-items: center;
            }
            .news, .lecture, .announcement, .student-style {
                width: 90%; /* 在小屏幕上内容块占据更大宽度 */
            }
            .nav {
                flex-direction: column;
                gap: 10px;
            }
        }
        .student-style-section {
            margin: 40px auto; /* 设置上下外边距 */
            padding: 20px; /* 设置内边距 */
            text-align: center; /* 居中对齐 */
            background-color: #F4A460; /* 背景颜色与学生风采一致 */
            border-radius: 10px; /* 圆角 */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* 添加阴影 */
        }

        .student-style-section .student-style {
            background-color: transparent; /* 去掉内部背景色，使用外部背景色 */
            width: 100%; /* 占满整个容器 */
            text-align: center;
            padding: 20px 0; /* 调整内边距 */
        }

        a {
            text-decoration: none; /* 去除下划线 */
            color: black; /* 设置文本颜色为黑色 */
        }

        a:hover {
            color: #555; /* 鼠标悬停时设置为深灰色（可选） */
        }

        

    </style>

    <link rel="shortcut icon" href="../imgs/favicon.ico"> 
</head>
<body>

    <div class="header">
        <h1>哈尔滨工业大学（威海）学生科创中心</h1>
    </div>

    <div class="nav">
        <div class="nav-item">4个选项卡</div>
        <div class="nav-item">白底黑字</div>
        <div class="nav-item">暂时设置4个</div>
        <div class="nav-item">一个选项一个图标</div>
    </div>

    <div class="content">
        <div class="left-column">
            <div class="news">
                <h2>比赛新闻</h2>
                <div class="news-title"> <a href="#">新闻标题</a></div>
            </div>
            <div class="lecture">
                <h2>校内讲座</h2>
                <div class="lecture-title"> <a href="#">讲座标题</a></div>
            </div>
        </div>
        <div class="right-column">
            <div class="announcement">
                <h2>通知公告</h2>
            </div>
        </div>
    </div>

     <div class="student-style-section">
        <div class="student-style">
            <h2>学生风采</h2>
        </div>
    </div>

    <div class="footer">
        <div class="footer-item">
            <h3>快速入口：</h3>
            <p>------</p>
        </div>
        <div class="footer-item">
            <h3>问题与反馈</h3>
        </div>
    </div>

</body>
</html>
